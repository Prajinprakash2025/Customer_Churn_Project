<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Seller Panel{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f4f6fb;
            --ink: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --success: #10b981;
            --amber: #f59e0b;
            --card: #ffffff;
            --border: #e5e7eb;
            --nav: #0b1220;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Manrope', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; }

        .seller-nav {
            background: var(--nav);
            color: #fff;
            padding: 14px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 1040;
        }

        .seller-nav .brand {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.3px;
            color: #fff;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .pill-btn {
            border-radius: 999px;
            padding: 9px 16px;
            font-weight: 600;
            border: 1px solid transparent;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .pill-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12); }

        .pill-btn.outline {
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #e2e8f0;
            background: transparent;
        }

        .pill-btn.primary {
            background: #111827;
            color: #fff;
            border: 1px solid #1f2937;
        }

        .pill-btn.accent {
            background: #ef4444;
            color: #fff;
            border: 1px solid #ef4444;
        }

        .page-shell { padding: 28px 0 48px; }

        .content-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 12px 35px rgba(15, 23, 42, 0.06);
        }

        table thead th {
            font-size: 13px;
            letter-spacing: 0.02em;
            color: var(--muted);
            font-weight: 700;
            border-bottom: 1px solid var(--border);
        }

        table tbody td { vertical-align: middle; }

        .badge-soft {
            border-radius: 999px;
            padding: 6px 12px;
            font-weight: 700;
            font-size: 12px;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="navbar seller-nav">
        <div class="container-xxl d-flex justify-content-between align-items-center">
            <a class="brand navbar-brand m-0" href="{% url 'seller_dashboard' %}">Seller Panel</a>
            <div class="nav-actions">
                <a href="{% url 'seller_products' %}" class="pill-btn outline text-white">My Products</a>
                <a href="{% url 'add_products' %}" class="pill-btn primary">Add Product</a>
                <a href="{% url 'logout' %}" class="pill-btn accent">Logout</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <div class="container-xxl">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
