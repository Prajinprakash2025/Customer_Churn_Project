{% extends 'admin/base_admin.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Products</h2>
    <a href="{% url 'add_product' %}" class="btn btn-primary">Add Product</a>
</div>

<form method="POST" action="{% url 'bulk_delete_products' %}" id="bulkDeleteForm">
    {% csrf_token %}
    <table class="table table-hover table-bordered">
        <thead class="table-light">
            <tr>
                <th width="40"><input type="checkbox" id="selectAll"></th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th class="text-end">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td><input type="checkbox" name="product_ids" value="{{ product.id }}" class="prod-checkbox"></td>
                <td>{{ product.name }}</td>
                <td>₹{{ product.price }}</td>
                <td>{{ product.stock }}</td>
                <td class="text-end">
                    <a href="{% url 'edit_product' product.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'delete_product' product.id %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <button type="submit" class="btn btn-danger" onclick="return confirm('Delete selected products?')">Delete Selected</button>
</form>

<script>
    document.getElementById('selectAll').addEventListener('change', function() {
        var checkboxes = document.querySelectorAll('.prod-checkbox');
        for (var checkbox of checkboxes) {
            checkbox.checked = this.checked;
        }
    });
</script>
{% endblock %}
