{% extends 'admin/base_admin.html' %}

{% block content %}
<h2>{% if mode == "edit" %}Edit{% else %}Add{% endif %} Product</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required
               value="{{ product.name|default:'' }}">
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input type="number" step="0.01" name="price" class="form-control" required
               value="{{ product.price|default:'' }}">
    </div>

    <div class="mb-3">
        <label>Stock</label>
        <input type="number" name="stock" class="form-control" required
               value="{{ product.stock|default:'' }}">
    </div>

    <div class="mb-3">
        <label>Product Image</label>
        <input type="file" name="image" class="form-control">
        {% if product and product.image %}
            <small class="text-muted">Current: <a href="{{ product.image.url }}" target="_blank">View Image</a></small>
        {% endif %}
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea name="description" class="form-control">{{ product.description|default:'' }}</textarea>
    </div>

    <div class="mb-3">
        <label>Category</label>
        <select name="category" class="form-control">
            <option value="">Select Category</option>
            {% for category in categories %}
                <option value="{{ category.id }}"
                    {% if product and product.category and product.category.id == category.id %}selected{% endif %}>
                    {{ category.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-success">Save Product</button>
</form>

{% endblock %}
