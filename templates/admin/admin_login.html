<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub Admin | Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .brand-logo {
            color: #3b82f6;
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -0.5px;
        }
        .brand-logo span { color: white; }
        .form-label { color: #94a3b8; font-size: 13px; font-weight: 600; }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            color: white;
        }
        .btn-login {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">Shop<span>Hub</span> Admin</div>
    
    {% if messages %}
    <div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger border-start border-danger border-3 py-2 px-3 small mb-4">
        {% for message in messages %}{{ message }}{% endfor %}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">USERNAME</label>
            <input type="text" name="username" class="form-control" placeholder="admin_user" required>
        </div>
        <div class="mb-4">
            <label class="form-label">PASSWORD</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-login w-100">Access Dashboard</button>
    </form>
    
    <div class="mt-4 text-center">
        <a href="/" class="text-decoration-none text-muted small">← Back to Store</a>
    </div>
</div>

</body>
</html>
