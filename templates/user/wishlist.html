{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Wishlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-10">

    <h2 class="text-3xl font-bold mb-8">❤️ My Wishlist</h2>

    {% if wishlist_items %}

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">

        {% for item in wishlist_items %}
        <div class="bg-white p-3 rounded-xl shadow hover:shadow-lg transition duration-300">

            <!-- Product Image -->
            <div class="relative">
                <img src="{{ item.product.image.url }}"
                     class="h-32 w-full object-cover rounded-lg">

                <!-- Remove Button (Top Right) -->
                <a href="{% url 'remove_from_wishlist' item.product.id %}"
                   class="absolute top-2 right-2 bg-white rounded-full p-1 shadow text-red-500 hover:bg-red-100 text-xs">
                    ✕
                </a>
            </div>

            <!-- Product Name -->
            <h3 class="mt-3 font-semibold text-sm truncate">
                {{ item.product.name }}
            </h3>

            <!-- Price -->
            <p class="text-gray-700 text-sm font-medium mt-1">
                ₹ {{ item.product.price }}
            </p>

            <!-- Add to Cart Button -->
            <form method="POST"
                  action="{% url 'cart_add' item.product.id %}"
                  class="mt-3">
                {% csrf_token %}
                <button type="submit"
                        class="w-full bg-black text-white py-1.5 text-sm rounded-lg hover:bg-gray-800 transition"
                        {% if item.product.stock == 0 %}disabled{% endif %}>
                    {% if item.product.stock > 0 %}
                        Add to Cart
                    {% else %}
                        Out of Stock
                    {% endif %}
                </button>
            </form>

        </div>
        {% endfor %}

    </div>

    {% else %}

    <div class="bg-white p-10 text-center rounded-xl shadow">
        <p class="text-gray-600 text-lg">Your wishlist is empty.</p>
        <a href="{% url 'product_list' %}"
           class="inline-block mt-4 bg-black text-white px-5 py-2 rounded-lg hover:bg-gray-800 transition">
           Continue Shopping
        </a>
    </div>

    {% endif %}

</div>

</body>
</html>
