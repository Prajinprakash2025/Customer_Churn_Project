{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | E-Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm">

    <div class="w-full max-w-5xl grid md:grid-cols-2 bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden">

        <!-- Left Branding Section -->
        <div class="hidden md:flex flex-col justify-center items-center text-white p-10 bg-gradient-to-br from-black/60 to-black/20">
            <h1 class="text-4xl font-bold mb-4">E-Shop</h1>
            <p class="text-lg text-center opacity-90">
                Discover premium products.<br>
                Experience seamless shopping.
            </p>
        </div>

        <!-- Right Form Section -->
        <div class="bg-white p-10">

            <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">
                Create Account
            </h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-3 rounded text-sm 
                        {% if message.tags == 'error' %} bg-red-100 text-red-600 
                        {% else %} bg-green-100 text-green-600 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="text-sm text-gray-600">Username</label>
                    <input type="text" name="username" required
                        class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div>
                    <label class="text-sm text-gray-600">Email</label>
                    <input type="email" name="email" required
                        class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div>
                    <label class="text-sm text-gray-600">Password</label>
                    <input type="password" name="password" required
                        class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition duration-300">
                    Register
                </button>
            </form>

            <p class="text-center text-sm text-gray-600 mt-6">
                Already have an account?
                <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">
                    Login
                </a>
            </p>

        </div>

    </div>

</body>
</html>
